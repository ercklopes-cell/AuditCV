<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUDITCV — Entrar</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .login-wrap { width:100%; max-width:420px; text-align:center; }
    .login-logo { font-size:2rem; font-weight:800; margin-bottom:8px; }
    .login-sub  { color:var(--text-muted); margin-bottom:40px; }
    .divider { display:flex; align-items:center; gap:12px; margin:24px 0; color:var(--text-muted); font-size:.8rem; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .google-btn {
      display:flex; align-items:center; justify-content:center; gap:12px;
      width:100%; padding:14px; border-radius:12px;
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
      color:var(--text); font-size:1rem; font-weight:600; cursor:pointer;
      transition:all .25s;
    }
    .google-btn:hover { background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.25); }
    .google-icon { width:20px; height:20px; }
    .login-card { padding:40px; position:relative; overflow:hidden; }
    .login-card::before {
      content:''; position:absolute; top:-100px; left:50%; transform:translateX(-50%);
      width:300px; height:300px; border-radius:50%;
      background:radial-gradient(circle,rgba(245,176,65,.1),transparent 70%);
      pointer-events:none;
    }
    .login-terms { font-size:.78rem; color:var(--text-muted); margin-top:20px; line-height:1.6; }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo gradient-text">✦ AUDITCV</div>
  <p class="login-sub">Gere currículos profissionais com IA em segundos</p>

  <div class="card login-card">
    <h2 style="font-size:1.4rem;margin-bottom:6px">Bem-vindo de volta</h2>
    <p class="text-muted text-sm mb-24">Entre com sua conta Google para continuar</p>

    <button class="google-btn" id="btn-google" onclick="loginGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar com Google
    </button>

    <div class="divider">ou</div>

    <!-- Email/senha alternativo (magic link) -->
    <div class="form-group mb-16">
      <label class="form-label">E-mail</label>
      <input type="email" id="email-input" class="form-control" placeholder="seu@email.com" />
    </div>
    <button class="btn btn-outline w-full" id="btn-magic" onclick="loginMagicLink()">
      Receber link de acesso por e-mail
    </button>

    <p class="login-terms">
      Ao entrar, você concorda com os <a href="#">Termos de Uso</a> e a
      <a href="#">Política de Privacidade</a> do AUDITCV.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/main.js"></script>
<script>
  // Redireciona se já logado
  (async () => {
    const session = await getSession();
    if (session) window.location.href = 'dashboard.html';
  })();

  async function loginGoogle() {
    const btn = document.getElementById('btn-google');
    setLoading(btn, true, 'Redirecionando...');
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/dashboard.html' }
    });
    if (error) { toast('Erro ao entrar com Google: ' + error.message, 'error'); setLoading(btn, false); }
  }

  async function loginMagicLink() {
    const email = document.getElementById('email-input').value.trim();
    if (!email) { toast('Informe seu e-mail', 'error'); return; }
    const btn = document.getElementById('btn-magic');
    setLoading(btn, true, 'Enviando...');
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + '/dashboard.html' }
    });
    setLoading(btn, false);
    if (error) { toast('Erro: ' + error.message, 'error'); }
    else { toast('✉️ Link enviado! Verifique seu e-mail.', 'success', 6000); }
  }
</script>
</body>
</html>
